name: test
run-name: test Actions
on:
  workflow_dispatch:
  schedule:
   - cron: '0 0 * * *'
  pull_request:
    branches:
      - main
jobs:
  run-all-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10']
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-env

      - name: run test
        timeout-minutes: 4
        run: uv run pytest __tests/
        shell: bash

  try-startup:
    strategy:
      matrix:
        python-version: ['3.10']
      fail-fast: false
    runs-on: ubuntu-latest
    needs: [run-all-test]
    steps:

      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-env

      - name: build vue component
        uses: ./.github/actions/build-vue-component

      - name: run
        run: |
          uv run actions_scripts/try_startup_script.py
    